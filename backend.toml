[build]
command = "npm ci && npm run generate && npm run build"
publish = "frontend/dist"

[functions]
directory = "backend/functions"
node_bundler = "esbuild"
external_node_modules = ["@prisma/client", "prisma", "@aws-sdk/client-s3", "@aws-sdk/s3-request-presigner"]
included_files = ["node_modules/.prisma/**"]

[build.environment]
NODE_VERSION = "20"


[functions."daily-availability-slack"]
schedule = "0 5,6 * * 1-5"

[functions."daily-trainers-slack"]
schedule = "0 5,6 * * *"

[functions."control-horario-reminders"]
schedule = "*/15 * * * *"
