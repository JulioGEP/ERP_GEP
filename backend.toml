[build]
command = "npm ci && npm run generate && npm run build"
publish = "frontend/dist"

[functions]
directory = "backend/functions"
node_bundler = "esbuild"
external_node_modules = ["@prisma/client", "prisma", "@aws-sdk/client-s3", "@aws-sdk/s3-request-presigner"]
included_files = ["node_modules/.prisma/**"]

[build.environment]
NODE_VERSION = "20"


[[scheduled]]
function = "daily-availability-slack"
cron = "0 5 * * 1-5"

[[scheduled]]
function = "daily-availability-slack"
cron = "0 6 * * 1-5"

[[scheduled]]
function = "daily-trainers-slack"
cron = "0 5 * * *"

[[scheduled]]
function = "daily-trainers-slack"
cron = "0 6 * * *"

[[scheduled]]
function = "control-horario-reminders"
cron = "*/15 * * * *"
